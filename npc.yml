name: "<#0388fc><bold>Farmer"
# by default, we use the hologram for npc's name. you can enable both if you want.
use-name: false

# only works with Citizens and FancyNpcs, supports every entity type, https://jd.papermc.io/paper/org/bukkit/entity/EntityType.html
default-type: VILLAGER
# should the entity be baby by default?
default-baby: false
# https://jd.papermc.io/paper/org/bukkit/entity/Villager.Profession.html
default-villager-profession: FARMER
default-glowing: true
default-glowing-color: "BLUE"

skin-texture: ""
skin-signature: ""
skin-name: ""

permission-skins:
  "Notch": "uxmfarmer.usenotch"

scale: 1.0
entity-specific-scales:
  VILLAGER: 2.5