prefix: "<#ff7700><bold>Farmer <dark_gray>►<reset>"
reloaded: "<prefix> <gray>Configuration files updated"
saved: "<prefix> <gray>Player datas have been saved and permission caches refreshed."
empty: "<red>Empty"

new-version-available: '<prefix> <gold>A newer version of uxmFarmer is released, please update. <blue>(<green>new: <new><gray>, <green>current: <current><blue>)'
pre-release-version:
  - "You are running a pre-release build of uxmFarmer."
  - "Please let UXPLIMA staff know about any issues you come across."

command-errors:
  invalid-argument: "<prefix> <red>Your usage of this command was wrong."
  no-permission: "<prefix> <red>You do not have permission to use this command."
  too-many-arguments: "<prefix> <red>Too many arguments."
  not-enough-arguments: "<prefix> <red>Not enough arguments."
  unknown-command: "<prefix> <red>You have used a non-existent command."
help-message:
  - ""
  - "<#d6b656><bold>Farmer Commands</bold>"
  - "<gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gray>"
  - ""
  - "<gray>/farmer <#6bbcff>buy <white>— Purchases a new farmer."
  - "<gray>/farmer <#6bbcff>menu <white>— Opens the farmer menu."
  - "<gray>/farmer <#6bbcff>teleport <white>— Teleports the farmer to you."
  - "<gray>/farmer <#6bbcff>disappear <white>— Hides the farmer in your current area or makes it visible again."
  - "<gray>/farmer <#6bbcff>skin <yellow><name> <white>— Changes the farmer’s skin name."
  - "<gray>/farmer <#6bbcff>return <white>— Refunds the farmer and returns the cost."
  - "<gray>/farmer <#6bbcff>sellall <white>— Sells all collected products."
  - ""
  - "<gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gray>"
  - ""
admin:
  info-command:
    header:
      - ""
      - "<#d6b656><bold>uxmFarmer <gray><version></gray> — Admin Info"
      - "<gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gray>"
      - ""
    messages:
      - "<gray>Selected farmer: <aqua><farmer>"
      - "<gray>Owner: <aqua><owner> <yellow>(<owner_uuid>)"
      - "<gray>Members (<member_amount>): <aqua><members>"
      - "<gray>Location: <aqua><location> <green>[Click On Location To Teleport]"
      - "<gray>Skin name: <aqua><skin>"
      - "<gray>Region ID: <aqua><region>"
      - "<gray>Stored XP: <aqua><xp>"
      - "<gray>Glow Color: <aqua><glow>"
      - "<gray>Entity Type: <aqua><entity>"
      - "<gray>Enabled settings: <aqua><enabled_settings> <red>[Click on a setting to disable it]"
      - "<gray>Disabled settings: <red><disabled_settings> <green>[Click on a setting to enable it]"
    footer:
      - ""
      - "<gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gray>"
      - "<gray>To check all the help commands, please use <#6bbcff><click:run_command:'/uxmfarmer help'>/uxmfarmer help</click>"
      - "<gray>Need help? <#6bbcff><u><click:open_url:'https://github.com/UXPLIMA/uxmFarmer-Wiki/wiki/'>Click to open the uxmFarmer Wiki</click>"
    no-selected-farmer: "<prefix> <red>You haven't selected a farmer yet, use <aqua>/uxmfarmer help <red>if you want to get help."
  help-command:
    header:
      - ""
      - "<#d6b656><bold>uxmFarmer <gray><version></gray> — Admin Commands</bold> <gray>(Page <page>)"
      - "<gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gray>"
      - ""
    commands:
      - "<gray>/uxmfarmer <#6bbcff>help <page number> <white>— Shows help commands in that page."
      - "<gray>/uxmfarmer <#6bbcff>select [uuid] <white>— Selects nearest farmer or farmer with given UUID to perform edits on."
      - "<gray>/uxmfarmer <#6bbcff>save <white>— Saves all data to the database."
      - "<gray>/uxmfarmer <#6bbcff>reload <white>— Reloads config and all plugin files."
      - "<gray>/uxmfarmer <#6bbcff>clearpermcache <white>— Clears cached player permissions."
      - "<gray>/uxmfarmer <#6bbcff>bypass <white>— Toggles cooldown bypass mode."
      - "<gray>/uxmfarmer <#6bbcff>stats <white>— Displays overall farmer statistics."
      - "<gray>/uxmfarmer <#6bbcff>bulkedit <yellow><setting> <true|false> <white>— Disables or enables given setting for every farmer."
      - "<gray>/uxmfarmer <#6bbcff>editsetting <yellow><setting> <true|false> <white>— Disables or enables given setting for selected farmer."
      - "<gray>/uxmfarmer <#6bbcff>delete <yellow><player> <white>— Deletes given player’s farmer."
      - "<gray>/uxmfarmer <#6bbcff>clearlogs <yellow><white>— Clears logs of selected farmer."
      - "<gray>/uxmfarmer <#6bbcff>teleport <yellow><white>— Teleports you to selected farmer."
      - "<gray>/uxmfarmer <#6bbcff>setowner <yellow><player> <white>— Sets selected farmer's owner to given player."
      - "<gray>/uxmfarmer <#6bbcff>nearfarmers <yellow><radius> <white>— Lists farmers within the given radius."
      - "<gray>/uxmfarmer <#6bbcff>uuidof <yellow><player> <white>— Shows the farmer UUID of the player."
      - "<gray>/uxmfarmer <#6bbcff>deleteuuid <yellow> <white>— Deletes selected farmer."
      - "<gray>/uxmfarmer <#6bbcff>deleteall <yellow><player> <white>— Deletes all farmers owned by given player."
      - "<gray>/uxmfarmer <#6bbcff>givefarmer <yellow><player> <white>— Gives farmers to given player."
      - "<gray>/uxmfarmer <#6bbcff>give <yellow><player> FARMER_EGG <yellow><amount> <white>— Gives farmer eggs."
      - "<gray>/uxmfarmer <#6bbcff>give <yellow><player> LEVEL_CHANGER <yellow><amount> <product> <new level> <white>— Gives an item that changes given product's level."
      - "<gray>/uxmfarmer <#6bbcff>give <yellow><player> LEVEL_ADDER <yellow><amount> <product> <levels to add> <white>— Gives an item that adds given levels to given product's level."
    footer:
      - ""
      - "<gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gray>"
      - "<gray>Need help? <#6bbcff><u><click:open_url:'https://github.com/UXPLIMA/uxmFarmer-Wiki/wiki/'>Click to open the uxmFarmer Wiki</click>"
