  - "<gray>/çiftçi <#6bbcff>getir <white>— Çiftçiyi yanına ışınlar."
  - "<gray>/çiftçi <#6bbcff>yoket <white>— Çiftçiyi bulunduğun bölgede gizler veya tekrar görünür yapar."
