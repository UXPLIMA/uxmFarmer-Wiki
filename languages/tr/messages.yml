  - ""
admin:
  info-command:
    header:
      - ""
      - "<#d6b656><bold>uxmFarmer <gray><version></gray> — Admin Bilgi"
      - "<gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gray>"
