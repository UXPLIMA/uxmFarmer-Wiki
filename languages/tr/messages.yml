      - "<gray>Seçili çiftçi: <aqua><farmer>"
      - "<gray>Sahibi: <aqua><owner> <yellow>(<owner_uuid>)"
      - "<gray>Üyeler (<member_amount>): <aqua><members>"
      - "<gray>Konum: <aqua><location> <green>[Işınlanmak İçin Lokasyona Tıkla]"
