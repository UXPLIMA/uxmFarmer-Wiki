      - "<gray>Region ID: <aqua><region>"
      - "<gray>Biriken XP: <aqua><xp>"
      - "<gray>Parlama Rengi: <aqua><glow>"
      - "<gray>Varlık Türü: <aqua><entity>"
      - "<gray>Ayarlar: <aqua><settings> <aqua>[Açmak/kapamak için ayara tıkla]"
      - "<gray>AutoKill mobları: <red><auto_kill_values> <aqua>[Açmak/kapatmak için bir moba tıkla]"
      - "<gray>AutoKill ayarları: <red><auto_kill_settings> <aqua>[Açmak/kapatmak için bir ayara tıkla]"
      - "<gray>AutoSell eşyaları: <red><auto_sell_values> <aqua>[Açmak/kapatmak için bir eşyaya tıkla]"
      - "<gray>AutoSell ayarları: <aqua><auto_sell_settings> <aqua>[Açmak/kapatmak bırakmak için bir ayara tıkla]"
    footer:
      - ""
      - "<gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gray>"
      - "<gray>Tüm yardım komutlarını görmek için <#6bbcff><click:run_command:'/uxmfarmer help'>/uxmfarmer yardım</click> <gray>komutunu kullanın."
      - "<gray>Çözemediğiniz bir özellik mi var? <#6bbcff><u><click:open_url:'https://github.com/UXPLIMA/uxmFarmer-Wiki/wiki/'>uxmFarmer Wiki'sini açmak için tıklayın</click>"
    no-selected-farmer: "<prefix> <red>Henüz bir çiftçi seçmedin, yardım almak istersen <aqua>/uxmfarmer help <red>komutunu kullan."
  help-command:
    header:
      - ""
      - "<#d6b656><bold>uxmFarmer <gray><version></gray> — Yönetici Komutları</bold> <gray>(Sayfa <page>)"
      - "<gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gray>"
      - ""
    commands:
      - "<gray>/uxmfarmer <#6bbcff>yardım <sayfa> <white>— Girilen sayfadaki yardım komutlarını gösterir."
      - "<gray>/uxmfarmer <#6bbcff>seç [uuid] <white>— Girilen UUID'ye sahip çiftçiyi veya en yakınınızdaki çiftçiyi seçer ve düzenlemelerde onu kullanır."
      - "<gray>/uxmfarmer <#6bbcff>menü <white>— Seçilen çiftçinin menüsünü açar."
      - "<gray>/uxmfarmer <#6bbcff>kaydet <white>— Tüm verileri veritabanına kaydeder."
      - "<gray>/uxmfarmer <#6bbcff>reload <white>— Yapılandırmayı ve tüm eklenti dosyalarını yeniden yükler."
      - "<gray>/uxmfarmer <#6bbcff>clearpermcache <white>— Önbelleğe alınmış oyuncu yetkilerini temizler."
      - "<gray>/uxmfarmer <#6bbcff>checkperm <oyuncu> <yetki> <white>— Girilen oyuncunun, girilen yetkiye sahip olma durumunun önbellekteki halini gösterir."
      - "<gray>/uxmfarmer <#6bbcff>bypass <white>— Bekleme süresi (cooldown) bypass modunu açar/kapatır."
      - "<gray>/uxmfarmer <#6bbcff>stats <white>— Genel çiftçi istatistiklerini görüntüler."
      - "<gray>/uxmfarmer <#6bbcff>bulkedit <yellow><setting> <true|false> <white>— Girilen ayarı her çiftçi için açar veya kapatır."
      - "<gray>/uxmfarmer <#6bbcff>editsetting <yellow><setting> <true|false> <white>— Girilen ayarı seçilen çiftçi için açar veya kapatır."
      - "<gray>/uxmfarmer <#6bbcff>teleport <white>— Sizi seçilen çiftçiye ışınlar."
      - "<gray>/uxmfarmer <#6bbcff>clearlogs <white>— Seçilen çiftçinin günlüklerini temizler."
      - "<gray>/uxmfarmer <#6bbcff>setowner <yellow><oyuncu> <white>— Seçilen çiftçinin sahibini belirtilen oyuncu olarak ayarlar."
      - "<gray>/uxmfarmer <#6bbcff>delete <yellow><oyuncu> <white>— Belirtilen oyuncunun çiftçisini siler."
      - "<gray>/uxmfarmer <#6bbcff>nearfarmers <yellow><çap> <white>— Belirtilen yarıçaptaki çiftçileri listeler."
      - "<gray>/uxmfarmer <#6bbcff>uuidof <yellow><oyuncu> <white>— Oyuncunun çiftçi UUID bilgisini gösterir."
      - "<gray>/uxmfarmer <#6bbcff>deleteuuid <white>— Seçilen çiftçiyi siler."
      - "<gray>/uxmfarmer <#6bbcff>deleteall <yellow><oyuncu> <white>— Oyuncuya ait tüm çiftçileri siler."
      - "<gray>/uxmfarmer <#6bbcff>givefarmer <yellow><oyuncu> <white>— Belirtilen oyuncuya çiftçi verir."
      - "<gray>/uxmfarmer <#6bbcff>give <yellow><oyuncu> FARMER_EGG <yellow><miktar> <white>— Çiftçi yumurtası verir."
      - "<gray>/uxmfarmer <#6bbcff>give <yellow><oyuncu> LEVEL_CHANGER <yellow> <miktar> <ürün> <yeni seviye> <white>— Belirtilen ürünün seviyesini değiştiren bir eşya verir."
      - "<gray>/uxmfarmer <#6bbcff>give <yellow><oyuncu> LEVEL_ADDER <yellow><miktar> <ürün> <eklenecek seviye> <white>— Belirtilen ürünün seviyesine seviye ekleyen bir eşya verir."
    footer:
      - ""
      - "<gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gray>"
      - "<gray>Yardım mı lazım? <#6bbcff><u><click:open_url:'https://github.com/UXPLIMA/uxmFarmer-Wiki/wiki/'>uxmFarmer Wiki sayfasını açmak için tıklayın</click>"
